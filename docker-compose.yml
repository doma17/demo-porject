services:
  postgres:
    image: postgres:15.8
    container_name: demo-project-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-demo_project}
      POSTGRES_USER: ${POSTGRES_USER:-demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: demo-project-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-demo_project}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-demo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET must be set and at least 32 characters long}
      AI_API_KEY: ${AI_API_KEY:?AI_API_KEY must be set}
      AI_MODEL: ${AI_MODEL:-gpt-5.5}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_TIMEOUT: ${AI_TIMEOUT:-30s}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME:-Admin}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
