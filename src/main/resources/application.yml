spring:
  application:
    name: demo-project
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demo_project}
    username: ${SPRING_DATASOURCE_USERNAME:demo}
    password: ${SPRING_DATASOURCE_PASSWORD:demo}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    access-token-ttl: 15m
    refresh-token-ttl: 7d


ai:
  openai:
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5.5}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    timeout: ${AI_TIMEOUT:30s}
